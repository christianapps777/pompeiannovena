<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pompeian Novena - Guide. Privacy Policy & Terms of Use</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.65;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        background: linear-gradient(135deg, #ffffff 0%, #f4f0ff 100%);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px;
        box-shadow: var(--shadow);
        margin-bottom: 24px;
      }

      .app-name {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }

      h1 {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.15;
        margin: 0 0 12px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        max-width: 760px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        margin: 20px 0 24px;
      }

      .lang-switch,
      .nav-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button,
      .tab-link {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
        text-decoration: none;
      }

      button:hover,
      .tab-link:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      button.active,
      .tab-link.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      .content-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .section {
        padding: 28px;
        border-bottom: 1px solid var(--border);
      }

      .section:last-child {
        border-bottom: none;
      }

      .section-title {
        margin: 0 0 18px;
        font-size: 28px;
        line-height: 1.2;
      }

      .document-content {
        color: var(--text);
        font-size: 15px;
      }

      .document-content h3 {
        margin-top: 28px;
        margin-bottom: 12px;
        font-size: 20px;
      }

      .document-content p {
        margin: 0 0 16px;
        white-space: pre-wrap;
      }

      .document-content .numbered-title {
        font-weight: 700;
        font-size: 18px;
        margin-top: 26px;
        margin-bottom: 12px;
      }

      .footer {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        padding: 24px 0 8px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 700px) {
        .container {
          padding: 16px;
        }

        .hero,
        .section {
          padding: 20px;
        }

        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .section-title {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <div class="app-name">Pompeian Novena</div>
        <h1 id="pageTitle">Privacy Policy & Terms of Use</h1>
        <p class="subtitle" id="pageSubtitle">
          Read the Privacy Policy and Terms of Use for the Pompeian Novena -
          Guide application.
        </p>
      </header>

      <div class="toolbar">
        <div class="lang-switch">
          <button id="langEnBtn" type="button" class="active">English</button>
          <button id="langPlBtn" type="button">Polski</button>
        </div>

        <div class="nav-tabs">
          <a href="#privacy" class="tab-link" id="privacyTab">Privacy Policy</a>
          <a href="#terms" class="tab-link" id="termsTab">Terms of Use</a>
        </div>
      </div>

      <main class="content-card">
        <section class="section" id="privacy">
          <h2 class="section-title" id="privacyTitle"></h2>
          <div class="document-content" id="privacyContent"></div>
        </section>

        <section class="section" id="terms">
          <h2 class="section-title" id="termsTitle"></h2>
          <div class="document-content" id="termsContent"></div>
        </section>
      </main>

      <footer class="footer" id="footerText">Pompeian Novena - Guide</footer>
    </div>
    <script src="documents.js"></script>
  </body>
</html>
